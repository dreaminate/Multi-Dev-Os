<svg width="100%" viewBox="0 0 720 492" role="img" xmlns="http://www.w3.org/2000/svg"><title>Multi-Dev-Os 运作逻辑</title><desc>团队并发开发 OS 端到端流程:身份→角色→权限、任务生命周期与 DAG、并发 Goal Loop、folder 化并发原理与 validate 自检。</desc>
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7a7873" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
 text{font-family:-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
 .fn{font-size:11px;font-weight:600;}.ds{font-size:10px;}.tg{font-size:13px;font-weight:600;fill:#33322f;}.lbl{font-size:10px;fill:#7a7873;}
 .box{fill:#fbfaf8;stroke:#d8d6cc;stroke-width:0.6;}
 .c-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5;}.c-teal .fn{fill:#085041;}.c-teal .ds{fill:#0F6E56;}
 .c-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;}.c-gray .fn{fill:#444441;}.c-gray .ds{fill:#5F5E5A;}
 .c-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;}.c-purple .fn{fill:#3C3489;}.c-purple .ds{fill:#534AB7;}
 .c-amber{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5;}.c-amber .fn{fill:#633806;}.c-amber .ds{fill:#854F0B;}
 .c-red{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5;}.c-red .fn{fill:#791F1F;}.c-red .ds{fill:#A32D2D;}
</style>
<rect x="0" y="0" width="720" height="492" fill="#fdfdfb"/>
<text x="40" y="27" style="font-size:15px;font-weight:600;fill:#2c2c2a">Multi-Dev-Os · 运作逻辑 —— 从身份到自检</text>
<text x="40" y="45" style="font-size:11px;fill:#5f5e5a">你是谁 → 任务从哪来 → 怎么干（并发 Goal Loop） → 为什么不冲突 + 自检</text>

<rect class="box" x="40" y="56" width="640" height="82" rx="8"/>
<text class="tg" x="50" y="73">① 身份 → 角色 → 权限</text>
<g class="c-amber"><rect x="46" y="80" width="200" height="30" rx="4"/><text class="fn" x="53" y="93">.identity</text><text class="ds" x="53" y="105">本机 developer_id（gitignore）</text></g>
<line x1="246" y1="95" x2="284" y2="95" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="250" y="90">值∈</text>
<g class="c-teal"><rect x="288" y="80" width="120" height="30" rx="4"/><text class="fn" x="295" y="93">TEAM.md</text><text class="ds" x="295" y="105">全员花名册</text></g>
<line x1="408" y1="95" x2="448" y2="111" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="410" y="90">定 role</text>
<g class="c-purple"><rect x="452" y="78" width="222" height="26" rx="4"/><text class="fn" x="459" y="95">leader×1 / admin×N · 可分配 + land</text></g>
<g class="c-teal"><rect x="452" y="106" width="222" height="26" rx="4"/><text class="fn" x="459" y="123">developer · 只写自己卡 + self-review</text></g>

<rect class="box" x="40" y="144" width="640" height="116" rx="8"/>
<text class="tg" x="50" y="161">② 任务生命周期 · 卡 = uuid8 文件夹</text>
<g class="c-teal"><rect x="46" y="170" width="136" height="40" rx="4"/><text class="fn" x="53" y="186">三晋升源</text><text class="ds" x="53" y="200">研究台 / GOAL / dev×claude</text></g>
<line x1="182" y1="190" x2="222" y2="190" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="184" y="185">mint uuid</text>
<g class="c-purple"><rect x="226" y="172" width="132" height="36" rx="4"/><text class="fn" x="233" y="188">pool/{uuid8}/</text><text class="ds" x="233" y="201">待分配 · committed</text></g>
<line x1="358" y1="190" x2="398" y2="190" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="358" y="185">分配·admin</text>
<g class="c-purple"><rect x="402" y="172" width="128" height="36" rx="4"/><text class="fn" x="409" y="188">{dev}/{uuid8}/</text><text class="ds" x="409" y="201">active</text></g>
<line x1="530" y1="190" x2="570" y2="190" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="535" y="185">完成</text>
<g class="c-purple"><rect x="574" y="172" width="100" height="36" rx="4"/><text class="fn" x="581" y="188">{dev}/done/</text><text class="ds" x="581" y="201">落档→land</text></g>
<text x="50" y="232" style="font-size:10.5px;fill:#5f5e5a">全部 depends_on → DAG（validate 守无环 + 无悬空）· 连通分量 = 可并行簇</text>
<text x="50" y="249" style="font-size:10.5px;fill:#5f5e5a">land（done 合并进 main）仅 leader/admin · 拆分 / 分配算法 = 后续 skill</text>

<rect class="box" x="40" y="266" width="640" height="92" rx="8"/>
<text class="tg" x="50" y="283">③ 并发 Goal Loop</text>
<g class="c-teal"><rect x="46" y="292" width="108" height="40" rx="4"/><text class="fn" x="53" y="308">认身份 + pull</text><text class="ds" x="53" y="322">看 DEVMAP/diff</text></g>
<line x1="154" y1="312" x2="170" y2="312" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="172" y="292" width="92" height="40" rx="4"/><text class="fn" x="179" y="308">取卡</text><text class="ds" x="179" y="322">自己 / pool</text></g>
<line x1="264" y1="312" x2="280" y2="312" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="282" y="292" width="118" height="40" rx="4"/><text class="fn" x="289" y="308">实现 + 对抗测试</text><text class="ds" x="289" y="322">跑绿 · 不破基线</text></g>
<line x1="400" y1="312" x2="416" y2="312" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="418" y="292" width="128" height="40" rx="4"/><text class="fn" x="425" y="308">落档 + 刷 state</text><text class="ds" x="425" y="322">build + validate</text></g>
<line x1="546" y1="312" x2="562" y2="312" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-purple"><rect x="564" y="292" width="110" height="40" rx="4"/><text class="fn" x="571" y="308">land</text><text class="ds" x="571" y="322">仅 leader/admin</text></g>
<path d="M619 332 V346 H100 V334" fill="none" stroke="#7a7873" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/><text x="250" y="343" style="font-size:10px;fill:#7a7873">↻ 他人 pull main 同步 · 各自据新代码刷 state</text>

<rect class="box" x="40" y="366" width="640" height="110" rx="8"/>
<text class="tg" x="50" y="383">④ 为什么不冲突 + 自检</text>
<g class="c-gray"><rect x="46" y="390" width="300" height="78" rx="4"/><text class="fn" x="54" y="408">folder 化 → per-dev 文件零冲突</text><text class="ds" x="54" y="427">全局少数单文件(TEAM/GOAL/DEVMAP) land 时 leader 合</text><text class="ds" x="54" y="445">生成视图脚本现生成 · 读 = 遍历 {type}/*/ 聚合</text><text class="ds" x="54" y="463">导航 map 只定位、实时看原文 + 代码</text></g>
<g class="c-red"><rect x="374" y="390" width="300" height="78" rx="4"/><text class="fn" x="382" y="408">validate_dev · 唯一阻断闸</text><text class="ds" x="382" y="427">身份∈TEAM / leader 唯一 · owner==folder · uuid 唯一</text><text class="ds" x="382" y="445">缺TASK.md / 成环 / 悬空 / 孤儿 → FAIL</text><text class="ds" x="382" y="463">生成视图过期 / state 假绿灯 → FAIL</text></g>
</svg>
