<svg width="100%" viewBox="0 0 900 500" role="img" xmlns="http://www.w3.org/2000/svg"><title>Multi-Dev-Os 运作流程</title><desc>团队并发开发 OS 的运作流程:身份与角色、任务生命周期与 DAG、并发 Goal Loop、folder 化并发原理与 validate 自检。</desc>
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7a7873" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
 text{font-family:-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
 .fn{font-size:11.5px;font-weight:600;}.ds{font-size:10.5px;}.tg{font-size:13px;font-weight:600;fill:#33322f;}.lbl{font-size:10px;fill:#7a7873;}
 .box{fill:#fbfaf8;stroke:#d8d6cc;stroke-width:0.6;}
 .c-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5;}.c-teal .fn{fill:#085041;}.c-teal .ds{fill:#0F6E56;}
 .c-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;}.c-gray .fn{fill:#444441;}.c-gray .ds{fill:#5F5E5A;}
 .c-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;}.c-purple .fn{fill:#3C3489;}.c-purple .ds{fill:#534AB7;}
 .c-amber{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5;}.c-amber .fn{fill:#633806;}.c-amber .ds{fill:#854F0B;}
 .c-red{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5;}.c-red .fn{fill:#791F1F;}.c-red .ds{fill:#A32D2D;}
</style>
<rect x="0" y="0" width="900" height="500" fill="#fdfdfb"/>
<text x="40" y="28" style="font-size:16px;font-weight:600;fill:#2c2c2a">Multi-Dev-Os 运作流程</text>
<text x="40" y="47" style="font-size:11.5px;fill:#5f5e5a">你是谁 → 任务从哪来 → 怎么干(并发 Goal Loop) → 为什么不冲突,以及自检</text>

<rect class="box" x="40" y="58" width="820" height="86" rx="8"/>
<text class="tg" x="50" y="76">① 身份、角色、权限</text>
<g class="c-amber"><rect x="46" y="84" width="240" height="32" rx="4"/><text class="fn" x="54" y="98">.identity</text><text class="ds" x="54" y="111">本机 developer_id（不入库）</text></g>
<line x1="286" y1="100" x2="328" y2="100" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="290" y="95">值∈</text>
<g class="c-teal"><rect x="332" y="84" width="150" height="32" rx="4"/><text class="fn" x="340" y="98">TEAM.md</text><text class="ds" x="340" y="111">全员花名册</text></g>
<line x1="482" y1="100" x2="524" y2="111" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="486" y="95">定 role</text>
<g class="c-purple"><rect x="528" y="82" width="324" height="26" rx="4"/><text class="fn" x="536" y="99">leader×1 / admin×N · 可分配 + land</text></g>
<g class="c-teal"><rect x="528" y="112" width="324" height="26" rx="4"/><text class="fn" x="536" y="129">developer · 只写自己卡 + self-review</text></g>

<rect class="box" x="40" y="150" width="820" height="120" rx="8"/>
<text class="tg" x="50" y="168">② 任务生命周期（卡放在 uuid8 文件夹）</text>
<g class="c-teal"><rect x="46" y="178" width="180" height="42" rx="4"/><text class="fn" x="54" y="194">三晋升源</text><text class="ds" x="54" y="208">研究台 / GOAL / dev×claude</text></g>
<line x1="226" y1="198" x2="268" y2="198" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="228" y="193">mint uuid</text>
<g class="c-purple"><rect x="272" y="180" width="150" height="36" rx="4"/><text class="fn" x="280" y="196">pool/{uuid8}/</text><text class="ds" x="280" y="209">待分配 · committed</text></g>
<line x1="422" y1="198" x2="462" y2="198" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="424" y="193">分配·admin</text>
<g class="c-purple"><rect x="466" y="180" width="150" height="36" rx="4"/><text class="fn" x="474" y="196">{dev}/{uuid8}/</text><text class="ds" x="474" y="209">active</text></g>
<line x1="616" y1="198" x2="656" y2="198" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/><text class="lbl" x="622" y="193">完成</text>
<g class="c-purple"><rect x="660" y="180" width="160" height="36" rx="4"/><text class="fn" x="668" y="196">{dev}/done/</text><text class="ds" x="668" y="209">落档 → land</text></g>
<text x="50" y="240" style="font-size:10.5px;fill:#5f5e5a">所有卡的 depends_on 构成 DAG,validate 检查无环、无悬空;每个连通分量是一组可并行的工作。</text>
<text x="50" y="258" style="font-size:10.5px;fill:#5f5e5a">land(done 合并进 main)只有 leader/admin 能做;怎么拆分、怎么分配是后续 skill。</text>

<rect class="box" x="40" y="276" width="820" height="98" rx="8"/>
<text class="tg" x="50" y="294">③ 并发 Goal Loop</text>
<g class="c-teal"><rect x="46" y="302" width="130" height="42" rx="4"/><text class="fn" x="54" y="319">认身份 + pull</text><text class="ds" x="54" y="333">看 DEVMAP/diff</text></g>
<line x1="176" y1="323" x2="212" y2="323" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="216" y="302" width="100" height="42" rx="4"/><text class="fn" x="224" y="319">取卡</text><text class="ds" x="224" y="333">自己 / pool</text></g>
<line x1="316" y1="323" x2="352" y2="323" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="356" y="302" width="134" height="42" rx="4"/><text class="fn" x="364" y="319">实现 + 对抗测试</text><text class="ds" x="364" y="333">跑绿 · 不破基线</text></g>
<line x1="490" y1="323" x2="526" y2="323" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="530" y="302" width="144" height="42" rx="4"/><text class="fn" x="538" y="319">落档 + 刷 state</text><text class="ds" x="538" y="333">build + validate</text></g>
<line x1="674" y1="323" x2="710" y2="323" stroke="#7a7873" stroke-width="1.4" marker-end="url(#ar)"/>
<g class="c-purple"><rect x="714" y="302" width="130" height="42" rx="4"/><text class="fn" x="722" y="319">land</text><text class="ds" x="722" y="333">仅 leader/admin</text></g>
<path d="M779 344 V356 H110 V346" fill="none" stroke="#7a7873" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/><text x="320" y="353" style="font-size:10px;fill:#7a7873">他人 pull main 同步,各自据新代码刷 state</text>

<rect class="box" x="40" y="380" width="820" height="106" rx="8"/>
<text class="tg" x="50" y="398">④ 为什么不冲突,以及怎么自检</text>
<g class="c-gray"><rect x="46" y="406" width="396" height="74" rx="4"/><text class="fn" x="54" y="424">按 folder 分开,per-dev 文件基本不冲突</text><text class="ds" x="54" y="442">少数共享单文件(TEAM/GOAL/DEVMAP) land 时由 leader 合</text><text class="ds" x="54" y="460">全局视图脚本现生成 · 读某一类就遍历 {type}/*/ 聚合</text><text class="ds" x="54" y="476">导航 map 只定位,实际看原文和代码</text></g>
<g class="c-red"><rect x="462" y="406" width="390" height="74" rx="4"/><text class="fn" x="470" y="424">validate_dev · 唯一阻断闸</text><text class="ds" x="470" y="442">身份∈TEAM / leader 唯一 · owner==folder · uuid 唯一</text><text class="ds" x="470" y="460">缺TASK.md / 成环 / 悬空 / 孤儿 → FAIL</text><text class="ds" x="470" y="476">生成视图过期 / state 假绿灯 → FAIL</text></g>
</svg>
