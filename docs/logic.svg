<svg width="100%" viewBox="0 0 680 606" role="img" xmlns="http://www.w3.org/2000/svg"><title>Multi-Dev-Os 完整逻辑</title><desc>团队并发开发 OS 的端到端逻辑:身份与角色、任务卡生命周期与 DAG、并发 Goal Loop、folder 化并发原理与 validate 自检。</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7a7873" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
  text{font-family:-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
  .t{font-size:14px;fill:#2c2c2a;}.ts{font-size:12px;fill:#5f5e5a;}.th{font-size:14px;font-weight:500;fill:#2c2c2a;}
  .box{fill:#fbfaf8;stroke:#d3d1c7;stroke-width:0.5;}
  .c-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5;}.c-teal .th,.c-teal .t{fill:#085041;}.c-teal .ts{fill:#0F6E56;}
  .c-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;}.c-gray .th,.c-gray .t{fill:#444441;}.c-gray .ts{fill:#5F5E5A;}
  .c-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;}.c-purple .th,.c-purple .t{fill:#3C3489;}.c-purple .ts{fill:#534AB7;}
  .c-amber{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5;}.c-amber .th,.c-amber .t{fill:#633806;}.c-amber .ts{fill:#854F0B;}
  .c-red{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5;}.c-red .th,.c-red .t{fill:#791F1F;}.c-red .ts{fill:#A32D2D;}
</style>
<rect x="0" y="0" width="680" height="606" fill="#fdfdfb"/>
<text class="th" x="40" y="24">Multi-Dev-Os · 完整逻辑</text>

<rect class="box" x="40" y="40" width="600" height="132" rx="8"/>
<text class="th" x="50" y="58">① 身份 + 角色</text>
<g class="c-amber"><rect x="46" y="66" width="150" height="38" rx="4"/><text class="th" x="54" y="81">.identity</text><text class="ts" x="54" y="94">本机 developer_id</text></g>
<g class="c-teal"><rect x="46" y="112" width="150" height="38" rx="4"/><text class="th" x="54" y="127">TEAM.md</text><text class="ts" x="54" y="140">全员 + role</text></g>
<g class="c-gray"><rect x="240" y="89" width="120" height="40" rx="4"/><text class="th" x="248" y="105">你是谁</text><text class="ts" x="248" y="120">+ 什么 role</text></g>
<g class="c-purple"><rect x="404" y="66" width="228" height="38" rx="4"/><text class="th" x="412" y="81">leader×1 / admin×N</text><text class="ts" x="412" y="94">可【分配】+【land】</text></g>
<g class="c-teal"><rect x="404" y="112" width="228" height="38" rx="4"/><text class="th" x="412" y="127">developer</text><text class="ts" x="412" y="140">只写自己卡 + self-review</text></g>
<line x1="196" y1="85" x2="238" y2="103" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="196" y1="131" x2="238" y2="113" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="105" x2="402" y2="88" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="113" x2="402" y2="128" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect class="box" x="40" y="184" width="600" height="150" rx="8"/>
<text class="th" x="50" y="202">② 任务流（生命周期）· 逻辑 id = {owner}-{uuid} · 文件夹名 = uuid8</text>
<g class="c-purple"><rect x="46" y="212" width="158" height="44" rx="4"/><text class="th" x="54" y="231">三晋升源</text><text class="ts" x="54" y="245">研究 / GOAL / dev×claude</text></g>
<g class="c-amber"><rect x="250" y="214" width="150" height="40" rx="4"/><text class="th" x="258" y="231">pool/{uuid8}</text><text class="ts" x="258" y="245">待分配 · owner wait</text></g>
<g class="c-purple"><rect x="448" y="214" width="184" height="40" rx="4"/><text class="th" x="456" y="231">{dev}/{uuid8}</text><text class="ts" x="456" y="245">已分配 · active</text></g>
<g class="c-purple"><rect x="448" y="276" width="184" height="38" rx="4"/><text class="th" x="456" y="291">{dev}/done/{uuid8}</text><text class="ts" x="456" y="304">落档</text></g>
<line x1="204" y1="234" x2="248" y2="234" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="206" y="228">mint uuid</text>
<line x1="400" y1="234" x2="446" y2="234" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="402" y="228">分配·改归属</text>
<line x1="540" y1="254" x2="540" y2="276" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="50" y="328">全部 depends_on → DAG（validate 守无环 + 无悬空）→ 连通分量 = 可并行簇（拆分/分配算法 = 后续 skill）</text>

<rect class="box" x="40" y="346" width="600" height="124" rx="8"/>
<text class="th" x="50" y="364">③ 并发 Goal Loop</text>
<g class="c-teal"><rect x="46" y="374" width="108" height="44" rx="4"/><text class="th" x="53" y="393">认身份 + pull</text><text class="ts" x="53" y="407">看 DEVMAP/diff</text></g>
<g class="c-teal"><rect x="168" y="374" width="96" height="44" rx="4"/><text class="th" x="175" y="393">取卡</text><text class="ts" x="175" y="407">自己 / pool 分配</text></g>
<g class="c-teal"><rect x="278" y="374" width="120" height="44" rx="4"/><text class="th" x="285" y="393">实现+对抗测试</text><text class="ts" x="285" y="407">跑绿 · 不破基线</text></g>
<g class="c-teal"><rect x="412" y="374" width="132" height="44" rx="4"/><text class="th" x="419" y="393">落档+刷 state</text><text class="ts" x="419" y="407">build + validate</text></g>
<g class="c-purple"><rect x="558" y="374" width="74" height="44" rx="4"/><text class="th" x="565" y="393">land</text><text class="ts" x="565" y="407">leader/admin</text></g>
<line x1="154" y1="396" x2="166" y2="396" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="264" y1="396" x2="276" y2="396" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="398" y1="396" x2="410" y2="396" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="544" y1="396" x2="556" y2="396" stroke="#7a7873" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M595 418 V438 H100 V420" fill="none" stroke="#7a7873" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="250" y="434">↻ 他人 pull main 同步 · 各自据新代码刷 state</text>

<rect class="box" x="40" y="482" width="600" height="100" rx="8"/>
<text class="th" x="50" y="500">④ 并发原理 + 自检</text>
<g class="c-gray"><rect x="46" y="508" width="290" height="64" rx="4"/><text class="th" x="54" y="526">folder 化 → 各写各文件 · 零冲突</text><text class="ts" x="54" y="544">全局视图(board/dev-map/ledger…)脚本现生成</text><text class="ts" x="54" y="562">读 = 遍历 {type}/*/ 聚合;map 只定位、看原文+代码</text></g>
<g class="c-red"><rect x="350" y="508" width="290" height="64" rx="4"/><text class="th" x="358" y="526">validate_dev · 唯一阻断闸</text><text class="ts" x="358" y="544">身份∈TEAM/leader唯一 · owner==folder · uuid 唯一</text><text class="ts" x="358" y="562">缺TASK.md/DAG成环/悬空/孤儿/假绿灯/OQ → FAIL</text></g>
</svg>
